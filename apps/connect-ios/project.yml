name: EKKOConnect
options:
  bundleIdPrefix: app.ekkoconnect
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "7.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"

targets:
  EKKOConnect:
    type: application
    platform: iOS
    sources:
      - path: EKKOConnect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ekkoconnect.connect
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: EKKOConnect/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: EKKOConnect/Resources/EKKOConnect.entitlements
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Kingfisher
      - package: RevenueCat
        product: RevenueCat
