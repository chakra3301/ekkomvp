name: EKKOConnect
options:
  bundleIdPrefix: app.ekkoconnect
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "7.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"

targets:
  EKKOConnect:
    type: application
    platform: iOS
    sources:
      - path: EKKOConnect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ekkoconnect.connect
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "14"
        DEVELOPMENT_TEAM: ""  # set in Xcode → Signing & Capabilities
        INFOPLIST_FILE: EKKOConnect/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: EKKOConnect/Resources/EKKOConnect.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Kingfisher
      - package: RevenueCat
        product: RevenueCat
      - target: EKKOConnectWidgets
        embed: true
        codeSign: true

  # WidgetKit extension that owns the "New match" Live Activity. Shares
  # MatchActivityAttributes with the app target via an explicit source entry
  # so both processes decode the same schema.
  EKKOConnectWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: EKKOConnectWidgets
      - path: EKKOConnect/Core/LiveActivity/MatchActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ekkoconnect.connect.widgets
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "14"
        INFOPLIST_FILE: EKKOConnectWidgets/Info.plist
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: false
